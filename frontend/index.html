<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Клининг CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .login-container { background: white; border-radius: 16px; padding: 40px; width: 400px; margin: 100px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-container h1 { text-align: center; margin-bottom: 30px; }
        .login-container input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-container button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .main-container { display: none; max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #3498db; color: white; }
        button { background: #3498db; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin: 5px; }
        .delete { background: #e74c3c; }
        .success { background: #27ae60; }
        .edit { background: #f39c12; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .error { color: red; text-align: center; margin-top: 10px; }
        .form-grid { display: grid; gap: 10px; margin-bottom: 20px; }
        .role-badge { background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 12px; margin-bottom: 5px; color: #666; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-card h3 { font-size: 14px; margin-bottom: 10px; opacity: 0.9; }
        .stat-card p { font-size: 28px; font-weight: bold; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; }
        .chart-card h3 { margin-bottom: 15px; color: #333; }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            width: 500px;
            border-radius: 12px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover { color: black; }
        .reset-btn { background: #95a5a6; }
    </style>
</head>
<body>
    <div id="loginPanel" class="login-container">
        <h1>🧹 Клининг CRM</h1>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div id="loginError" class="error"></div>
        <div style="margin-top:20px; font-size:12px; color:#999; text-align:center;">
            <p><strong>Тестовые учетные записи:</strong></p>
            <p>admin / 123456 - Администратор</p>
            <p>anna / 123456 - Сотрудник (клинер)</p>
            <p>accountant / 123456 - Бухгалтерия</p>
            <p>director / 123456 - Администрация</p>
        </div>
    </div>

    <div id="mainPanel" class="main-container">
        <div class="header">
            <div><strong>👤 <span id="userName"></span></strong> <span id="userRole" class="role-badge"></span></div>
            <button onclick="logout()" style="background:#e74c3c;">Выйти</button>
        </div>
        <div id="dynamicContent"></div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Редактировать заказ</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="form-grid">
                <input type="text" id="editAddress" placeholder="Адрес">
                <select id="editClient"></select>
                <select id="editService"></select>
                <select id="editEmployee"></select>
                <select id="editStatus">
                    <option value="Новый">Новый</option>
                    <option value="В работе">В работе</option>
                    <option value="Выполнен">Выполнен</option>
                    <option value="Оплачен">Оплачен</option>
                </select>
                <button class="success" onclick="saveOrderEdit()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentToken = null;
        let currentRole = null;
        let currentUserId = null;
        let editingOrderId = null;
        let ordersData = [];
        let chart1 = null, chart2 = null;

        async function apiRequest(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;
            const response = await fetch(url, { ...options, headers });
            if (response.status === 401) { alert('Сессия истекла'); logout(); throw new Error('Unauthorized'); }
            return response;
        }

        function openModal(orderId) {
            editingOrderId = orderId;
            loadEditSelects();
            loadOrderForEdit(orderId);
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; editingOrderId = null; }

        async function loadEditSelects() {
            try {
                const [clients, services, employees] = await Promise.all([
                    apiRequest(`${API_URL}/clients`).then(r => r.json()),
                    apiRequest(`${API_URL}/services`).then(r => r.json()),
                    apiRequest(`${API_URL}/employees`).then(r => r.json())
                ]);
                const clientSelect = document.getElementById('editClient');
                const serviceSelect = document.getElementById('editService');
                const employeeSelect = document.getElementById('editEmployee');
                clientSelect.innerHTML = '<option value="">-- Клиент --</option>';
                clients.forEach(c => clientSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);
                serviceSelect.innerHTML = '<option value="">-- Услуга --</option>';
                services.forEach(s => serviceSelect.innerHTML += `<option value="${s.id}">${s.name} (${s.price} руб.)</option>`);
                employeeSelect.innerHTML = '<option value="">-- Сотрудник --</option>';
                employees.forEach(e => employeeSelect.innerHTML += `<option value="${e.id}">${e.fullName} (${e.position})</option>`);
            } catch(e) { console.error(e); }
        }

        async function loadOrderForEdit(orderId) {
            const res = await apiRequest(`${API_URL}/orders/${orderId}`);
            const order = await res.json();
            document.getElementById('editAddress').value = order.address;
            document.getElementById('editClient').value = order.clientId;
            document.getElementById('editService').value = order.serviceId;
            document.getElementById('editEmployee').value = order.employeeId;
            document.getElementById('editStatus').value = order.status;
        }

        window.saveOrderEdit = async () => {
            const address = document.getElementById('editAddress').value;
            const clientId = document.getElementById('editClient').value;
            const serviceId = document.getElementById('editService').value;
            const employeeId = document.getElementById('editEmployee').value;
            const status = document.getElementById('editStatus').value;
            if (!address || !clientId || !serviceId || !employeeId) { alert('Заполните все поля!'); return; }
            try {
                const response = await apiRequest(`${API_URL}/orders/${editingOrderId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ address, clientId: parseInt(clientId), serviceId: parseInt(serviceId), employeeId: parseInt(employeeId), status })
                });
                if (response.ok) { alert('Заказ обновлен!'); closeModal(); await loadOrders(); } 
                else { alert('Ошибка при обновлении'); }
            } catch (error) { console.error(error); alert('Не удалось обновить'); }
        };

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) { document.getElementById('loginError').innerText = 'Введите логин и пароль'; return; }
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                currentToken = data.token;
                currentRole = data.role;
                currentUserId = data.userId;
                document.getElementById('userName').innerHTML = data.username;
                document.getElementById('userRole').innerHTML = data.role;
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                loadInterfaceByRole();
            } catch(e) { document.getElementById('loginError').innerText = 'Неверный логин или пароль'; }
        }

        function logout() {
            currentToken = null; currentRole = null; currentUserId = null;
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('mainPanel').style.display = 'none';
        }

        async function loadInterfaceByRole() {
            const content = document.getElementById('dynamicContent');
            if (currentRole === 'Admin') {
                content.innerHTML = `
                    <div class="card">
                        <h2>➕ Создать новый заказ</h2>
                        <div class="form-grid">
                            <input type="text" id="oAddress" placeholder="Адрес">
                            <select id="oClient"></select>
                            <select id="oService"></select>
                            <select id="oEmployee"></select>
                            <select id="oStatus">
                                <option value="Новый">Новый</option>
                                <option value="В работе">В работе</option>
                                <option value="Выполнен">Выполнен</option>
                                <option value="Оплачен">Оплачен</option>
                            </select>
                            <button class="success" onclick="addOrder()">📦 Создать заказ</button>
                        </div>
                    </div>
                    <div class="card">
                        <h2>👥 Клиенты</h2>
                        <div class="form-grid">
                            <input type="text" id="cName" placeholder="Имя">
                            <input type="text" id="cPhone" placeholder="Телефон">
                            <input type="email" id="cEmail" placeholder="Email">
                            <button onclick="addClient()">➕ Добавить клиента</button>
                        </div>
                        <table id="clientsTable"><thead><tr><th>ID</th><th>Имя</th><th>Телефон</th><th>Email</th><th></th></tr></thead><tbody></tbody></table>
                    </div>
                    <div class="card">
                        <h2>📋 Все заказы</h2>
                        <div class="filter-row">
                            <div class="filter-group"><label>Статус</label><select id="filterStatus"><option value="">Все</option><option>Новый</option><option>В работе</option><option>Выполнен</option><option>Оплачен</option></select></div>
                            <div class="filter-group"><label>Клиент</label><input type="text" id="filterClient" placeholder="Поиск по клиенту"></div>
                            <div class="filter-group"><label>От даты</label><input type="date" id="filterDateFrom"></div>
                            <div class="filter-group"><label>До даты</label><input type="date" id="filterDateTo"></div>
                            <div class="filter-group"><label>Поиск</label><input type="text" id="filterSearch" placeholder="Адрес / ID"></div>
                            <button onclick="applyFilters()">🔍 Поиск</button>
                            <button class="reset-btn" onclick="resetFilters()">🔄 Сброс</button>
                        </div>
                        <table id="ordersTable"><thead><tr><th>ID</th><th>Клиент</th><th>Услуга</th><th>Сотрудник</th><th>Адрес</th><th>Дата</th><th>Статус</th><th></th><th></th></tr></thead><tbody></tbody></table>
                    </div>
                `;
                await loadClients();
                await loadOrders();
                await loadSelects();
            } 
            else if (currentRole === 'Employee') {
                content.innerHTML = `<div class="card"><h2>🧹 Мои заказы</h2><table id="myOrdersTable"><thead><tr><th>ID</th><th>Клиент</th><th>Услуга</th><th>Адрес</th><th>Статус</th><th></th></tr></thead><tbody></tbody></table></div>`;
                await loadMyOrders();
            } 
            else if (currentRole === 'Accountant') {
                content.innerHTML = `<div class="card"><h2>💰 Финансы и оплаты</h2><table id="paymentsTable"><thead><tr><th>Заказ ID</th><th>Клиент</th><th>Сумма</th><th>Статус</th><th></th></tr></thead><tbody></tbody></table></div>`;
                await loadPayments();
            } 
            else if (currentRole === 'Director') {
                content.innerHTML = `
                    <div class="card">
                        <h2>📊 Статистика компании</h2>
                        <div class="stats-grid" id="statsGrid"></div>
                        <div class="charts-row">
                            <div class="chart-card"><h3>📈 Заказы по статусам</h3><canvas id="statusChart"></canvas></div>
                            <div class="chart-card"><h3>💰 Выручка по месяцам</h3><canvas id="revenueChart"></canvas></div>
                        </div>
                    </div>
                `;
                await loadStats();
            }
        }

        function applyFilters() {
            const status = document.getElementById('filterStatus').value;
            const client = document.getElementById('filterClient').value.toLowerCase();
            const dateFrom = document.getElementById('filterDateFrom').value;
            const dateTo = document.getElementById('filterDateTo').value;
            const search = document.getElementById('filterSearch').value.toLowerCase();
            renderFilteredOrders({ status, client, dateFrom, dateTo, search });
        }

        function resetFilters() {
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterClient').value = '';
            document.getElementById('filterDateFrom').value = '';
            document.getElementById('filterDateTo').value = '';
            document.getElementById('filterSearch').value = '';
            renderFilteredOrders({});
        }

        function renderFilteredOrders(filters) {
            let filtered = [...ordersData];
            if (filters.status) filtered = filtered.filter(o => o.status === filters.status);
            if (filters.client) filtered = filtered.filter(o => (o.client?.name || '').toLowerCase().includes(filters.client));
            if (filters.dateFrom) filtered = filtered.filter(o => new Date(o.orderDate) >= new Date(filters.dateFrom));
            if (filters.dateTo) filtered = filtered.filter(o => new Date(o.orderDate) <= new Date(filters.dateTo));
            if (filters.search) filtered = filtered.filter(o => o.address.toLowerCase().includes(filters.search) || o.id.toString().includes(filters.search));
            const tbody = document.querySelector('#ordersTable tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            filtered.forEach(o => {
                tbody.innerHTML += `<tr>
                    <td>${o.id}</td>
                    <td>${o.client?.name || 'Нет'}</td>
                    <td>${o.service?.name || 'Нет'}</td>
                    <td>${o.employee?.fullName || 'Нет'}</td>
                    <td>${o.address}</td>
                    <td>${new Date(o.orderDate).toLocaleDateString()}</td>
                    <td><select onchange="updateOrderStatus(${o.id}, this.value)">
                        <option ${o.status === 'Новый' ? 'selected' : ''}>Новый</option>
                        <option ${o.status === 'В работе' ? 'selected' : ''}>В работе</option>
                        <option ${o.status === 'Выполнен' ? 'selected' : ''}>Выполнен</option>
                        <option ${o.status === 'Оплачен' ? 'selected' : ''}>Оплачен</option>
                    </select></td>
                    <td><button class="edit" onclick="openModal(${o.id})">✏️ Ред.</button></td>
                    <td><button class="delete" onclick="deleteOrder(${o.id})">🗑️ Удалить</button></td>
                </tr>`;
            });
        }

        async function loadClients() {
            const res = await apiRequest(`${API_URL}/clients`);
            const clients = await res.json();
            const tbody = document.querySelector('#clientsTable tbody');
            if (tbody) {
                tbody.innerHTML = '';
                clients.forEach(c => {
                    tbody.innerHTML += `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.phone}</td><td>${c.email}</td><td><button class="delete" onclick="deleteClient(${c.id})">Удалить</button></td></tr>`;
                });
            }
        }

        window.addClient = async () => {
            const name = document.getElementById('cName')?.value;
            const phone = document.getElementById('cPhone')?.value;
            const email = document.getElementById('cEmail')?.value;
            if (!name || !phone || !email) { alert('Заполните все поля'); return; }
            await apiRequest(`${API_URL}/clients`, { method: 'POST', body: JSON.stringify({ name, phone, email }) });
            document.getElementById('cName').value = '';
            document.getElementById('cPhone').value = '';
            document.getElementById('cEmail').value = '';
            await loadClients();
            await loadSelects();
        };

        window.deleteClient = async (id) => {
            if (confirm('Удалить клиента?')) {
                await apiRequest(`${API_URL}/clients/${id}`, { method: 'DELETE' });
                await loadClients();
                await loadSelects();
            }
        };

        async function loadOrders() {
            const res = await apiRequest(`${API_URL}/orders`);
            ordersData = await res.json();
            renderFilteredOrders({});
        }

        window.deleteOrder = async (id) => {
            if (confirm('Удалить заказ?')) {
                await apiRequest(`${API_URL}/orders/${id}`, { method: 'DELETE' });
                await loadOrders();
            }
        };

        window.updateOrderStatus = async (id, status) => {
            await apiRequest(`${API_URL}/orders/${id}/status`, { method: 'PUT', body: JSON.stringify(status) });
            await loadOrders();
        };

        async function loadSelects() {
            try {
                const [clients, services, employees] = await Promise.all([
                    apiRequest(`${API_URL}/clients`).then(r => r.json()),
                    apiRequest(`${API_URL}/services`).then(r => r.json()),
                    apiRequest(`${API_URL}/employees`).then(r => r.json())
                ]);
                const clientSelect = document.getElementById('oClient');
                const serviceSelect = document.getElementById('oService');
                const employeeSelect = document.getElementById('oEmployee');
                if (clientSelect) {
                    clientSelect.innerHTML = '<option value="">-- Клиент --</option>';
                    clients.forEach(c => clientSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);
                }
                if (serviceSelect) {
                    serviceSelect.innerHTML = '<option value="">-- Услуга --</option>';
                    services.forEach(s => serviceSelect.innerHTML += `<option value="${s.id}">${s.name} (${s.price} руб.)</option>`);
                }
                if (employeeSelect) {
                    employeeSelect.innerHTML = '<option value="">-- Сотрудник --</option>';
                    employees.forEach(e => employeeSelect.innerHTML += `<option value="${e.id}">${e.fullName} (${e.position})</option>`);
                }
            } catch(e) { console.error(e); }
        }

        window.addOrder = async () => {
            const address = document.getElementById('oAddress')?.value;
            const clientId = document.getElementById('oClient')?.value;
            const serviceId = document.getElementById('oService')?.value;
            const employeeId = document.getElementById('oEmployee')?.value;
            const status = document.getElementById('oStatus')?.value;
            if (!address || !clientId || !serviceId || !employeeId) { alert('Заполните все поля!'); return; }
            try {
                const response = await apiRequest(`${API_URL}/orders`, {
                    method: 'POST',
                    body: JSON.stringify({ clientId: parseInt(clientId), serviceId: parseInt(serviceId), employeeId: parseInt(employeeId), address, status, orderDate: new Date().toISOString() })
                });
                if (response.ok) {
                    alert('Заказ создан!');
                    document.getElementById('oAddress').value = '';
                    document.getElementById('oClient').value = '';
                    document.getElementById('oService').value = '';
                    document.getElementById('oEmployee').value = '';
                    document.getElementById('oStatus').value = 'Новый';
                    await loadOrders();
                }
            } catch (error) { console.error(error); alert('Не удалось создать заказ'); }
        };

        async function loadMyOrders() {
            const res = await apiRequest(`${API_URL}/orders/my`);
            const orders = await res.json();
            const tbody = document.querySelector('#myOrdersTable tbody');
            if (tbody) {
                tbody.innerHTML = '';
                orders.forEach(o => {
                    tbody.innerHTML += `<tr><td>${o.id}</td><td>${o.client?.name || 'Нет'}</td><td>${o.service?.name || 'Нет'}</td><td>${o.address}</td><td>${o.status}</td><td>${o.status !== 'Выполнен' ? `<button class="success" onclick="completeOrder(${o.id})">✅ Выполнить</button>` : '✅ Готово'}</td></tr>`;
                });
            }
        }

        window.completeOrder = async (id) => {
            await apiRequest(`${API_URL}/orders/${id}/complete`, { method: 'PUT' });
            await loadMyOrders();
        };

        async function loadPayments() {
            const res = await apiRequest(`${API_URL}/orders`);
            const orders = await res.json();
            const tbody = document.querySelector('#paymentsTable tbody');
            if (tbody) {
                tbody.innerHTML = '';
                orders.forEach(o => {
                    const price = o.service?.price || 0;
                    const clientName = o.client?.name || 'Клиент не указан';
                    tbody.innerHTML += `<tr><td>${o.id}</td><td>${clientName}</td><td>${price} руб.</td><td>${o.status}</td><td>${o.status !== 'Оплачен' ? `<button class="success" onclick="markPaid(${o.id})">💰 Отметить оплату</button>` : '💳 Оплачено'}</td></tr>`;
                });
            }
        }

        window.markPaid = async (id) => {
            await apiRequest(`${API_URL}/orders/${id}/status`, { method: 'PUT', body: JSON.stringify('Оплачен') });
            await loadPayments();
        };

        async function loadStats() {
            const res = await apiRequest(`${API_URL}/orders`);
            const orders = await res.json();
            
            const total = orders.length;
            const completed = orders.filter(o => o.status === 'Выполнен' || o.status === 'Оплачен').length;
            const totalSum = orders.reduce((sum, o) => sum + (o.service?.price || 0), 0);
            const active = orders.filter(o => o.status === 'Новый' || o.status === 'В работе').length;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><h3>📦 Всего заказов</h3><p>${total}</p></div>
                <div class="stat-card"><h3>✅ Выполнено</h3><p>${completed}</p></div>
                <div class="stat-card"><h3>🔄 В работе</h3><p>${active}</p></div>
                <div class="stat-card"><h3>💰 Выручка</h3><p>${totalSum} руб.</p></div>
            `;
            
            // График по статусам
            const statusCounts = { 'Новый': 0, 'В работе': 0, 'Выполнен': 0, 'Оплачен': 0 };
            orders.forEach(o => { if (statusCounts[o.status] !== undefined) statusCounts[o.status]++; });
            
            const ctx1 = document.getElementById('statusChart').getContext('2d');
            if (chart1) chart1.destroy();
            chart1 = new Chart(ctx1, {
                type: 'doughnut',
                data: { labels: ['Новый', 'В работе', 'Выполнен', 'Оплачен'], datasets: [{ data: [statusCounts['Новый'], statusCounts['В работе'], statusCounts['Выполнен'], statusCounts['Оплачен']], backgroundColor: ['#3498db', '#f39c12', '#27ae60', '#2ecc71'] }] }
            });
            
            // График по месяцам
            const monthlyRevenue = {};
            orders.forEach(o => {
                const date = new Date(o.orderDate);
                const month = `${date.getFullYear()}-${date.getMonth() + 1}`;
                monthlyRevenue[month] = (monthlyRevenue[month] || 0) + (o.service?.price || 0);
            });
            const months = Object.keys(monthlyRevenue).sort();
            const revenues = months.map(m => monthlyRevenue[m]);
            const ctx2 = document.getElementById('revenueChart').getContext('2d');
            if (chart2) chart2.destroy();
            chart2 = new Chart(ctx2, { type: 'line', data: { labels: months, datasets: [{ label: 'Выручка (руб.)', data: revenues, borderColor: '#667eea', backgroundColor: 'rgba(102, 126, 234, 0.1)', tension: 0.4 }] } });
        }
    </script>
</body>
</html>
